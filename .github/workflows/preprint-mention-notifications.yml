name: Preprint Mention Notification
on:
  schedule:
    - cron: '27 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mentions
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: mentions/environment.yml
          cache-environment: true
      - name: Run mention notification script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.MENTION_SLACK_WEBHOOK_URL }}
        run: python mentions.py
      - name: Commit and push changes
        run: |
          git config --local user.email "gh-notifications-bot@pathoplexus.org"
          git config --local user.name "Pathoplexus Notifications Bot"
          git add already_notified/*
          if ! git diff-index --quiet HEAD; then
            git commit -am "Update already notified preprint mentions"
            git push
          fi
